<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习仪表盘 - 生物化学学习平台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 1.8rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card .icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 2rem;
            opacity: 0.3;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }
        .stat-card.green .value { background: linear-gradient(135deg, #10b981, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card.orange .value { background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card.blue .value { background: linear-gradient(135deg, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card .label {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .section-title {
            font-size: 1.5rem;
            margin: 2.5rem 0 1.5rem;
            color: #f1f5f9;
        }
        .recommendation-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .recommendation-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        .chapter-progress-item {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chapter-progress-item:hover {
            border-color: #6366f1;
        }
        .chapter-info {
            flex: 1;
            margin-right: 1.5rem;
        }
        .chapter-name {
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        .progress-bar {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.5s;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 70px;">
            <div class="logo" onclick="location.href='index.html'">
                <div class="logo-icon">🧬</div>
                <div style="font-weight: 700; font-size: 1.2rem;">生化学习平台</div>
            </div>
            <div class="nav-links" style="list-style: none; display: flex; gap: 8px;">
                <a href="index.html">首页</a>
                <a href="chapters.html">学习中心</a>
                <a href="quiz.html">练习测试</a>
                <a href="community.html">社区交流</a>
                <a href="achievements.html">成就系统</a>
            </div>
            <div class="nav-user"></div>
        </div>
    </nav>

    <div class="container" style="padding: 2rem;">
        <div id="notLoggedIn" style="display: none; text-align: center; padding: 4rem 2rem;">
            <div style="font-size: 4rem; margin-bottom: 1.5rem;">🔐</div>
            <h2 style="margin-bottom: 1rem;">请先登录以查看学习进度</h2>
            <p style="color: #94a3b8; margin-bottom: 2rem;">登录后可追踪学习进度、获得成就激励</p>
            <button class="btn btn-primary btn-large" onclick="location.href='login.html'">登录</button>
            <button class="btn btn-secondary btn-large" onclick="location.href='register.html'">注册新账号</button>
        </div>

        <div id="dashboardContent">
            <!-- 欢迎区 -->
            <div class="dashboard-header">
                <h2 id="welcomeTitle" style="font-size: 2rem; margin-bottom: 0.5rem;">👋 欢迎回来</h2>
                <p id="welcomeSubtitle" style="color: #94a3b8; margin-bottom: 1.5rem;">继续你的生物化学学习之旅</p>
                
                <div style="display: flex; gap: 2rem; flex-wrap: wrap; align-items: center;">
                    <div>
                        <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 4px;">用户等级</div>
                        <div style="font-size: 1.8rem; font-weight: 700; color: #a855f7;" id="userLevel">Lv. 1</div>
                    </div>
                    <div>
                        <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 4px;">总经验值</div>
                        <div style="font-size: 1.8rem; font-weight: 700; color: #10b981;" id="totalXP">0 XP</div>
                    </div>
                    <div>
                        <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 4px;">连续学习</div>
                        <div style="font-size: 1.8rem; font-weight: 700; color: #f59e0b;" id="streak">0 天</div>
                    </div>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">📖</div>
                    <div class="label">已完成知识点</div>
                    <div class="value" id="statCompleted">0</div>
                    <div class="progress-text" id="statCompletedSub">0 / 0</div>
                </div>
                <div class="stat-card green">
                    <div class="icon">📝</div>
                    <div class="label">练习次数</div>
                    <div class="value" id="statQuiz">0</div>
                    <div class="progress-text">累计完成练习</div>
                </div>
                <div class="stat-card orange">
                    <div class="icon">⭐</div>
                    <div class="label">平均正确率</div>
                    <div class="value" id="statAvg">0%</div>
                    <div class="progress-text">综合练习表现</div>
                </div>
                <div class="stat-card blue">
                    <div class="icon">🏆</div>
                    <div class="label">解锁成就</div>
                    <div class="value" id="statAchievements">0</div>
                    <div class="progress-text" id="statAchievementsSub">0 / 0</div>
                </div>
            </div>

            <!-- 个性化推荐 -->
            <h3 class="section-title">🎯 为你推荐</h3>
            <div id="recommendations"></div>

            <!-- 各章节进度 -->
            <h3 class="section-title">📚 各章节学习进度</h3>
            <div id="chapterProgressList"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function initDashboard() {
            const user = UserSystem.getCurrentUser();
            if (!user) {
                document.getElementById('notLoggedIn').style.display = 'block';
                document.getElementById('dashboardContent').style.display = 'none';
                return;
            }

            document.getElementById('welcomeTitle').textContent = `👋 ${user.username}，欢迎回来！`;
            document.getElementById('welcomeSubtitle').textContent = '继续你的生物化学学习之旅';

            const stats = ProgressTracker.getOverallStats();
            if (stats) {
                document.getElementById('userLevel').textContent = `Lv. ${stats.level}`;
                document.getElementById('totalXP').textContent = `${stats.totalXp} XP`;
                document.getElementById('streak').textContent = `${stats.streak} 天`;
                document.getElementById('statCompleted').textContent = stats.completedKnowledge;
                document.getElementById('statCompletedSub').textContent = `${stats.completedKnowledge} / ${stats.totalKnowledge}`;
                document.getElementById('statQuiz').textContent = stats.totalQuizzes;
                document.getElementById('statAvg').textContent = `${stats.avgScore}%`;

                const totalAch = ProgressTracker.ACHIEVEMENTS.length;
                const unlocked = (user.achievements || []).length;
                document.getElementById('statAchievements').textContent = unlocked;
                document.getElementById('statAchievementsSub').textContent = `${unlocked} / ${totalAch}`;
            }

            // 推荐
            const recs = ProgressTracker.getRecommendations();
            const recEl = document.getElementById('recommendations');
            if (recs && recs.length > 0) {
                recEl.innerHTML = recs.slice(0, 4).map(r => `
                    <div class="recommendation-card" onclick="location.href='learning.html?chapterId=${r.chapterId}'">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                            <div style="font-size: 1.15rem; font-weight: 600; color: #f1f5f9;">${r.icon} ${r.title}</div>
                            <div style="padding: 4px 10px; background: rgba(99, 102, 241, 0.15); color: #a855f7; border-radius: 20px; font-size: 0.8rem; font-weight: 600;">推荐</div>
                        </div>
                        <div style="color: #94a3b8; margin-bottom: 6px;">${r.subtitle}</div>
                        <div style="color: #64748b; font-size: 0.85rem;">💡 ${r.reason}</div>
                    </div>
                `).join('');
            } else {
                recEl.innerHTML = '<div style="background: rgba(30, 41, 59, 0.5); border-radius: 16px; padding: 2rem; text-align: center; color: #94a3b8;">暂无推荐，开始你的学习之旅吧！</div>';
            }

            // 各章节进度
            const listEl = document.getElementById('chapterProgressList');
            listEl.innerHTML = BIOCHEM_DATA.chapters.map(ch => {
                const p = ProgressTracker.getChapterProgress(ch.id);
                return `
                    <div class="chapter-progress-item" onclick="location.href='learning.html?chapterId=${ch.id}'">
                        <div class="chapter-info">
                            <div class="chapter-name">${ch.icon} ${ch.title}</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${p.percentage}%"></div>
                            </div>
                            <div class="progress-text">已学习 ${p.completed} / ${p.total} 个知识点（${p.percentage}%）</div>
                        </div>
                        <button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.9rem;">
                            ${p.completed === 0 ? '开始学习' : p.percentage === 100 ? '复习' : '继续学习'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        initDashboard();
    </script>
</body>
