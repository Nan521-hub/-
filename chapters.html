<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习中心 - 生物化学学习平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 70px;">
            <div class="logo" onclick="location.href='index.html'">
                <div class="logo-icon">🧬</div>
                <div style="font-weight: 700; font-size: 1.2rem;">生化学习平台</div>
            </div>
            <div class="nav-links" style="list-style: none; display: flex; gap: 8px;">
                <a href="index.html">首页</a>
                <a href="chapters.html">学习中心</a>
                <a href="quiz.html">练习测试</a>
                <a href="community.html">社区交流</a>
                <a href="achievements.html">成就系统</a>
            </div>
            <div class="nav-user"></div>
        </div>
    </nav>

    <!-- 章节列表 -->
    <div class="container" style="padding: 3rem 2rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.8rem;">📚 课程章节</h1>
            <p style="color: #94a3b8; font-size: 1.1rem;">系统化学习生物化学核心知识</p>
        </div>

        <div id="chapterList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderChapters() {
            const listEl = document.getElementById('chapterList');
            const user = UserSystem.getCurrentUser();

            listEl.innerHTML = BIOCHEM_DATA.chapters.map(chapter => {
                const progress = user ? ProgressTracker.getChapterProgress(chapter.id) : { completed: 0, total: chapter.knowledge.length, percentage: 0 };
                const isCompleted = progress.percentage === 100 && progress.total > 0;

                return `
                    <div style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 2rem; transition: all 0.3s; cursor: pointer;" 
                         onmouseover="this.style.borderColor='#6366f1'; this.style.transform='translateY(-4px)';" 
                         onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.08)'; this.style.transform='translateY(0)';"
                         onclick="location.href='learning.html?chapterId=${chapter.id}'">
                        <div style="font-size: 2.5rem; margin-bottom: 1rem;">${chapter.icon}</div>
                        <div style="font-size: 0.9rem; color: #a855f7; font-weight: 600; margin-bottom: 8px;">${chapter.id.replace('chapter-', '第 ').replace(/^(.+)$/, '$1 章')}</div>
                        <h3 style="font-size: 1.3rem; margin-bottom: 10px;">${chapter.title.replace(/^第.+?章\s/, '')}</h3>
                        <p style="color: #94a3b8; font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.2rem;">${chapter.description}</p>
                        
                        <div style="background: rgba(15, 23, 42, 0.8); border-radius: 10px; height: 8px; overflow: hidden; margin-bottom: 8px;">
                            <div style="height: 100%; width: ${progress.percentage}%; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 0.5s;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #94a3b8;">
                            <span>${progress.completed} / ${progress.total} 知识点</span>
                            <span>${progress.percentage}%</span>
                        </div>

                        ${isCompleted ? '<div style="margin-top: 1rem; padding: 8px 14px; background: rgba(16, 185, 129, 0.15); color: #10b981; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: 600;">✓ 已完成学习</div>' : ''}

                        <div style="margin-top: 1.2rem; color: #64748b; font-size: 0.85rem;">📖 ${chapter.knowledge.length} 个知识点</div>
                    </div>
                `;
            }).join('');
        }

        // 检查登录状态
        if (!UserSystem.currentUser) {
            const container = document.querySelector('.container');
            const warning = document.createElement('div');
            warning.style.cssText = 'background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 14px; padding: 1.2rem 1.5rem; margin-bottom: 2rem; color: #fbbf24;';
            warning.innerHTML = '💡 <strong>提示：</strong>登录后可查看个人学习进度并获得成就激励。 <a href="login.html" style="color: #a855f7;">立即登录</a>';
            container.insertBefore(warning, container.firstChild);
        }

        renderChapters();
    </script>
</body>
</html>
