<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 生物化学学习平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 70px;">
            <div class="logo" onclick="location.href='index.html'">
                <div class="logo-icon">🧬</div>
                <div style="font-weight: 700; font-size: 1.2rem;">生化学习平台</div>
            </div>
            <div class="nav-links" style="list-style: none; display: flex; gap: 8px;">
                <a href="index.html">首页</a>
                <a href="chapters.html">学习中心</a>
                <a href="quiz.html">练习测试</a>
                <a href="community.html">社区交流</a>
                <a href="achievements.html">成就系统</a>
            </div>
            <div class="nav-user"></div>
        </div>
    </nav>

    <!-- 登录表单 -->
    <div style="min-height: calc(100vh - 70px); display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 3rem; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🧬</div>
                <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">欢迎回来</h2>
                <p style="color: #94a3b8;">继续你的生物化学学习之旅</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #cbd5e1;">用户名</label>
                    <input type="text" id="username" required style="width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #f1f5f9; font-size: 1rem;" placeholder="请输入用户名">
                </div>

                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #cbd5e1;">密码</label>
                    <input type="password" id="password" required style="width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #f1f5f9; font-size: 1rem;" placeholder="请输入密码">
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">🔐 登录</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
                还没有账号？ <a href="register.html" style="color: #a855f7; text-decoration: none; font-weight: 600;">立即注册</a>
            </div>

            <div style="margin-top: 2rem; padding: 1rem; background: rgba(99, 102, 241, 0.08); border-radius: 12px; font-size: 0.9rem; color: #94a3b8; text-align: center;">
                💡 提示：首次访问请先注册账号。数据将保存在本地浏览器中。
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const result = UserSystem.login(username, password);
            if (result.success) {
                showToast('登录成功！正在跳转...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showToast(result.message || '用户名或密码错误', 'error');
            }
        }
    </script>
</body>
</html>
